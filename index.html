<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drake AI FINAL</title>

<style>
body{
  background:#0f1115;
  color:#fff;
  font-family:Arial;
}
button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#2d6cdf;
  color:white;
}
#debug{
  background:black;
  color:#00ff88;
  height:200px;
  overflow:auto;
  margin-top:10px;
}
</style>
</head>

<body>

<button onclick="connectBLE()">CONNECT LIGHT</button>
<button onclick="startVoice()">START VOICE</button>
<button onclick="arm()">ARM AUDIO</button>

<div id="player"></div>

<pre id="debug"></pre>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

// ================= CONFIG =================
const MISTRAL_API_KEY = "sb4uBrl67jk1RV2gg1gLZqh2lkoSq3Py";
const YT_API_KEY = "AIzaSyBW9ylko1FTzfvco2NShiRE4lkI29fP7tc";

const DEVICE_NAME = "CLK";
const CHAR_UUID = "0000fff3-0000-1000-8000-00805f9b34fb";

const WAKE = ["drake","drink","break","dre","dark"];

// ================= DEBUG =================
function log(t){
  let d=document.getElementById("debug");
  d.textContent+=t+"\n";
  d.scrollTop=d.scrollHeight;
  console.log(t);
}

// ================= BLE =================
let char;

function packet(r,g,b){
  return new Uint8Array([0x7e,0x07,0x05,0x03,r,g,b,0x10,0xef]);
}

async function connectBLE(){
  let dev=await navigator.bluetooth.requestDevice({
    filters:[{namePrefix:DEVICE_NAME}],
    optionalServices:["0000fff0-0000-1000-8000-00805f9b34fb"]
  });

  let server=await dev.gatt.connect();
  let service=await server.getPrimaryService("0000fff0-0000-1000-8000-00805f9b34fb");
  char=await service.getCharacteristic(CHAR_UUID);

  log("BLE CONNECTED");
}

async function setLight(r,g,b){
  if(!char) return;
  await char.writeValue(packet(r,g,b));
}

// ================= YOUTUBE =================
let player;
let ready=false;
let unlocked=false;

function onYouTubeIframeAPIReady(){
  player=new YT.Player("player",{
    height:"0",
    width:"0",
    videoId:"",
    playerVars:{autoplay:1},
    events:{
      onReady:()=>{ready=true;log("YT READY");}
    }
  });
}
window.onYouTubeIframeAPIReady=onYouTubeIframeAPIReady;

async function playMusic(q){
  if(!unlocked){
    speak("Click arm audio first");
    return;
  }

  log("SEARCH "+q);

  let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=1&q=${encodeURIComponent(q)}&key=${YT_API_KEY}`;

  let res=await fetch(url);
  let data=await res.json();

  if(!data.items.length){
    speak("Song nahi mila");
    return;
  }

  let id=data.items[0].id.videoId;
  let title=data.items[0].snippet.title;

  log("PLAY "+title);

  player.loadVideoById(id);
  player.playVideo();
}

function pauseMusic(){player.pauseVideo();}
function resumeMusic(){player.playVideo();}

// ================= ARM =================
function arm(){
  unlocked=true;
  log("AUDIO ARMED");
}

// ================= SPEAK =================
function speak(t){
  let u=new SpeechSynthesisUtterance(t);
  speechSynthesis.speak(u);
}

// ================= VOICE =================
let rec;

function startVoice(){
  let SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  rec=new SR();
  rec.continuous=true;

  rec.onresult=async(e)=>{
    let text=e.results[e.results.length-1][0].transcript.toLowerCase();
    log("HEARD "+text);

    let wake=WAKE.find(w=>text.includes(w));
    if(!wake) return;

    let cmd=text.replace(wake,"").trim();

    await askAI(cmd);
  };

  rec.start();
}

// ================= AI =================
const PROMPT = `
Reply ONLY JSON.

Music:
{"type":"music","action":"play","query":"song"}

Light:
{"type":"light","value":[255,0,0]}

Question:
{"type":"question","response":"text"}
`;

async function askAI(q){
  log("AI "+q);

  let res=await fetch("https://api.mistral.ai/v1/chat/completions",{
    method:"POST",
    headers:{
      "Authorization":"Bearer "+MISTRAL_API_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      model:"mistral-large-latest",
      messages:[
        {role:"system",content:PROMPT},
        {role:"user",content:q}
      ]
    })
  });

  let data=await res.json();
  let raw=data.choices[0].message.content.replace(/```/g,"").trim();

  log("RAW "+raw);

  let obj=JSON.parse(raw);

  handle(obj);
}

// ================= HANDLE =================
function handle(o){

  if(o.type==="music"){
    playMusic(o.query);
  }

  if(o.type==="light"){
    setLight(o.value[0],o.value[1],o.value[2]);
  }

  if(o.type==="question"){
    speak(o.response);
  }
}

</script>

</body>
</html>
